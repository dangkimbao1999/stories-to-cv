services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    command: pnpm --filter @stories/web start --hostname 0.0.0.0
    restart: unless-stopped
    environment:
      APP_URL: ${APP_URL:-http://localhost:3000}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      AUTH_SECRET: ${AUTH_SECRET:-}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/stories_to_cv}
      DIRECT_URL: ${DIRECT_URL:-postgres://postgres:postgres@postgres:5432/stories_to_cv}
      NEXT_TELEMETRY_DISABLED: "1"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes: !reset []

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    command: pnpm --filter @stories/worker start
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/stories_to_cv}
      DIRECT_URL: ${DIRECT_URL:-postgres://postgres:postgres@postgres:5432/stories_to_cv}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes: !reset []
