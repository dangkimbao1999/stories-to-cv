services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: stories-to-cv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stories_to_cv
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
